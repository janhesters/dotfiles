# Extra autostart processes
exec-once = uwsm app -- hyprsunset
exec-once = ssh-add
exec-once = ~/.config/hypr/scripts/espanso-layout-sync

# Boot into Dvorak (index 1). QWERTY is index 0 so Electron apps (Cursor)
# that read the first/default XKB layout see QWERTY for correct hotkeys.
exec-once = sleep 0.5 && hyprctl switchxkblayout all 1
